<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AUTONOVA | Series A $15M Data Room</title>
<style>
:root{--bg:#0A0A0A;--gold:#C8943A;--text:#EAEAEA}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{max-width:600px;text-align:center}
h1{font-size:48px;font-weight:700;letter-spacing:6px;color:var(--gold);margin-bottom:12px}
.subtitle{font-size:18px;opacity:0.8;margin-bottom:48px}
.btn{display:block;border:2px solid var(--gold);color:var(--gold);padding:16px 32px;text-decoration:none;font-size:16px;font-weight:600;margin-bottom:16px;transition:all 0.3s;cursor:pointer;background:transparent;width:100%}
.btn:hover{background:var(--gold);color:var(--bg)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{width:95vw;height:90vh;position:relative}
.modal iframe{width:100%;height:100%;border:2px solid var(--gold);border-radius:8px;background:#fff}
.close{position:absolute;top:-40px;right:0;color:var(--gold);font-size:36px;cursor:pointer;font-weight:300}
.footer{margin-top:64px;font-size:13px;opacity:0.5}
@media(max-width:480px){h1{font-size:36px}}
</style>
</head>
<body>
<div class="container">
  <h1>AUTONOVA</h1>
  <p class="subtitle">Series A $15M | AI Infrastructure for Southeast Asia</p>

  <button class="btn" onclick="openModal('en')">View Deck EN</button>
  <button class="btn" onclick="openModal('th')">ดู Deck TH</button>
  <a class="btn" href="./AUTONOVA_Deal_Room.pdf" target="_blank">Access Data Room PDF</a>
  <a class="btn" href="./Financial_Model.xlsx" download>Download Financial Model</a>

  <div class="footer">Confidential · Updated June 2026</div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeModal()">&times;</span>
    <iframe id="deckFrame" src=""></iframe>
  </div>
</div>

<script>
// ใส่รหัสผ่านก่อนเข้าเว็บ
const pass = prompt("Enter Access Code:");
if(pass!== "AUTONOVA2026") {
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:40vh'>Access Denied</h1>";
}

const decks = {
  en: './autonova_v4_en.html',
  th: './autonova_v4_th.html'
};
function openModal(lang){
  document.getElementById('deckFrame').src = decks;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('active');
  document.getElementById('deckFrame').src = '';
  document.body.style.overflow = 'auto';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
