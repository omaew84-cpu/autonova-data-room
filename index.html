<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONOVA - Series A Data Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container { max-width: 600px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.2rem; color: #a0a0a0; margin-bottom: 3rem; line-height: 1.6; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 18px 40px; font-size: 1.1rem;
            border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
        .modal-content { position: relative; width: 90%; max-width: 700px; height: 90%; margin: 3% auto; background: #1a1a1a; border-radius: 16px; overflow: hidden; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 1001; line-height: 1; }
        .close:hover { color: #667eea; }
        iframe { width: 100%; height: 100%; border: none; }
        .footer { margin-top: 4rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AUTONOVA</h1>
        <p>Series A $15M Data Room<br>Request access to our confidential investor deck</p>
        <button class="btn" onclick="openModal()">Request Investor Deck</button>
        <div class="footer">© 2026 AUTONOVA. Confidential.</div>
    </div>

    <!-- Modal with Google Form -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSceJVKVVX20U5bBGPotqwkvRPnoO5CrjEaRsengUZr_Aa-8XQ/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('formModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('formModal').style.display = 'none';
        }
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('formModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
